<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diff Utils Demo - 差异比较工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles/common.css">
</head>
<body>
  <div class="noise-overlay"></div>

  <div class="container">
    <header>
      <a href="../../index.html" class="back-link">← 返回首页</a>
      <div class="logo">
        <div class="logo-icon">⚖️</div>
        <div>
          <h1>Diff Utils Demo</h1>
          <p class="subtitle">差异比较工具</p>
        </div>
      </div>
    </header>

    <main class="panel">
      <div class="panel-header">
        <div class="panel-icon" style="background: linear-gradient(135deg, var(--accent-cyan), #0891b2);">⚖️</div>
        <div>
          <h2 class="panel-title">差异比较工具</h2>
          <p class="panel-desc">提供对象和数组的深度比较功能</p>
        </div>
      </div>

      <div class="demo-grid">
        <div class="demo-card">
          <h3>深度比较 <span class="badge">deepEqual</span></h3>
          <p>深度比较两个值是否相等</p>
          <button class="btn" onclick="demoDeepEqual()">比较</button>
          <div class="result-box" id="deepEqualResult"></div>
        </div>

        <div class="demo-card">
          <h3>数组相等 <span class="badge">arraysEqual</span></h3>
          <p>比较两个数组是否相等</p>
          <button class="btn" onclick="demoArraysEqual()">比较</button>
          <div class="result-box" id="arraysEqualResult"></div>
        </div>

        <div class="demo-card">
          <h3>对象差异 <span class="badge">diff</span></h3>
          <p>比较两个对象的差异</p>
          <button class="btn" onclick="demoDiff()">比较</button>
          <div class="result-box" id="diffResult"></div>
        </div>

        <div class="demo-card">
          <h3>表单变更检测</h3>
          <p>模拟表单修改检测</p>
          <div class="input-group">
            <label>新邮箱</label>
            <input type="text" id="formEmail" placeholder="新邮箱" value="new@example.com">
          </div>
          <button class="btn" onclick="demoFormChange()">检测变更</button>
          <div class="result-box" id="formChangeResult"></div>
        </div>
      </div>
    </main>

    <footer>
      <p>Built with ⚡ by <a href="#">@zid-utils</a> · 开源工具函数库</p>
    </footer>
  </div>

  <script>
    // Sample Data
    const original = { name: '张三', age: 28, email: 'zhang@example.com' };
    const modified = { name: '李四', age: 28, email: 'zhang@example.com' };
    const array1 = [1, 2, 3];
    const array2 = [1, 2, 3];
    const array3 = [1, 3, 2];

    // Diff Utils Functions
    function deepEqual(a, b) {
      if (a === b) return true;
      if (a == null || b == null) return false;
      if (typeof a !== 'object' || typeof b !== 'object') return false;

      const keysA = Object.keys(a);
      const keysB = Object.keys(b);
      if (keysA.length !== keysB.length) return false;

      for (const key of keysA) {
        if (!keysB.includes(key)) return false;
        if (!deepEqual(a[key], b[key])) return false;
      }
      return true;
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      for (let i = 0; i < a.length; i++) {
        if (!deepEqual(a[i], b[i])) return false;
      }
      return true;
    }

    function diff(obj1, obj2) {
      const result = {};
      let hasDiff = false;
      for (const key in obj2) {
        if (!deepEqual(obj1[key], obj2[key])) {
          result[key] = obj2[key];
          hasDiff = true;
        }
      }
      return hasDiff ? result : null;
    }

    // Demos
    function demoDeepEqual() {
      const result1 = deepEqual({ a: 1 }, { a: 1 });
      const result2 = deepEqual({ a: { b: 1 } }, { a: { b: 2 } });
      document.getElementById('deepEqualResult').innerHTML = `
        <div class="result-label">深度比较结果</div>
        <div class="result-value">
          {a: 1} === {a: 1}: <span class="status-badge ${result1 ? 'success' : 'error'}"><span class="dot"></span>${result1 ? '相等' : '不等'}</span><br>
          {a: {b: 1}} === {a: {b: 2}}: <span class="status-badge ${result2 ? 'success' : 'error'}"><span class="dot"></span>${result2 ? '相等' : '不等'}</span>
        </div>
      `;
    }

    function demoArraysEqual() {
      const result1 = arraysEqual(array1, array2);
      const result2 = arraysEqual(array1, array3);
      document.getElementById('arraysEqualResult').innerHTML = `
        <div class="result-label">数组比较结果</div>
        <div class="result-value">
          [1,2,3] === [1,2,3]: <span class="status-badge ${result1 ? 'success' : 'error'}"><span class="dot"></span>${result1 ? '相等' : '不等'}</span><br>
          [1,2,3] === [1,3,2]: <span class="status-badge ${result2 ? 'success' : 'error'}"><span class="dot"></span>${result2 ? '相等' : '不等'}</span>
        </div>
      `;
    }

    function demoDiff() {
      const before = { name: '张三', age: 28, email: 'zhang@example.com' };
      const after = { name: '李四', age: 28, email: 'zhang@example.com' };
      const result = diff(before, after);
      document.getElementById('diffResult').innerHTML = `
        <div class="result-label">对象差异</div>
        <div class="result-value">
          ${result ? JSON.stringify(result, null, 2) : '无差异'}
        </div>
      `;
    }

    function demoFormChange() {
      const originalEmail = 'zhang@example.com';
      const newEmail = document.getElementById('formEmail').value;
      const changed = originalEmail !== newEmail;
      const result = diff({ email: originalEmail }, { email: newEmail });
      document.getElementById('formChangeResult').innerHTML = `
        <div class="result-label">表单变更检测</div>
        <div class="result-value">
          <span class="status-badge ${changed ? 'success' : 'error'}">
            <span class="dot"></span>${changed ? '已修改' : '未修改'}
          </span>
          ${changed ? `<br>变更内容: ${JSON.stringify(result)}` : ''}
        </div>
      `;
    }
  </script>
</body>
</html>
